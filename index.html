<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobil Programlama Çalışma Uygulaması</title>
<style>
    :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary2: #1d4ed8;
        --green: #16a34a;
        --red: #dc2626;
        --orange: #f59e0b;
        --border: #e5e7eb;
        --shadow: 0 12px 35px rgba(15, 23, 42, .10);
        --codebg: #111827;
        --codetext: #e5e7eb;
    }
    body.dark {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --primary: #60a5fa;
        --primary2: #3b82f6;
        --green: #22c55e;
        --red: #f87171;
        --orange: #fbbf24;
        --border: #374151;
        --shadow: 0 12px 35px rgba(0,0,0,.35);
        --codebg: #020617;
        --codetext: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
    }
    .app {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 18px;
    }
    header {
        background: linear-gradient(135deg, var(--primary), var(--primary2));
        color: white;
        border-radius: 22px;
        padding: 22px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
    }
    header h1 {
        margin: 0 0 6px;
        font-size: clamp(24px, 4vw, 38px);
        letter-spacing: -.5px;
    }
    header p {
        margin: 0;
        opacity: .92;
    }
    .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin: 16px 0;
    }
    .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, .06);
    }
    .stat small {
        display: block;
        color: var(--muted);
        font-size: 12px;
    }
    .stat b {
        font-size: 22px;
    }
    .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 14px;
        box-shadow: var(--shadow);
        margin-bottom: 16px;
    }
    .controls {
        display: grid;
        grid-template-columns: 1.2fr 1fr auto;
        gap: 10px;
        align-items: center;
    }
    input, select, textarea {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 13px;
        font-size: 15px;
        outline: none;
    }
    textarea {
        min-height: 110px;
        resize: vertical;
    }
    .modebar, .actions, .learnbar {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        margin-top: 12px;
    }
    button {
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        color: white;
        background: var(--primary);
        transition: transform .08s ease, opacity .15s ease;
    }
    button:hover { opacity: .92; }
    button:active { transform: scale(.98); }
    button.secondary { background: #64748b; }
    button.green { background: var(--green); }
    button.red { background: var(--red); }
    button.orange { background: var(--orange); color: #111827; }
    button.ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
    }
    button.active {
        outline: 3px solid rgba(37, 99, 235, .24);
    }
    .card {
        min-height: 360px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    .badgeRow {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
    }
    .badge {
        border: 1px solid var(--border);
        background: rgba(37, 99, 235, .08);
        color: var(--primary);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 700;
    }
    .badge.kind {
        color: var(--text);
        background: transparent;
    }
    .question {
        font-size: clamp(22px, 4vw, 34px);
        font-weight: 800;
        letter-spacing: -.4px;
        margin: 6px 0;
    }
    .answer {
        display: none;
        border-top: 1px solid var(--border);
        padding-top: 14px;
        font-size: 18px;
    }
    .answer.show { display: block; }
    .answerTitle {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
        margin-bottom: 4px;
    }
    .altBox, .hintBox, .ezberBox {
        background: rgba(148, 163, 184, .12);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        margin-top: 10px;
    }
    .ezberBox {
        border-left: 5px solid var(--orange);
    }
    pre {
        white-space: pre-wrap;
        background: var(--codebg);
        color: var(--codetext);
        padding: 14px;
        border-radius: 14px;
        overflow-x: auto;
        font-size: 14px;
        line-height: 1.45;
    }
    .testOptions {
        display: grid;
        gap: 10px;
        margin-top: 12px;
    }
    .optionBtn {
        text-align: left;
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        font-weight: 600;
    }
    .optionBtn.correct {
        background: rgba(22, 163, 74, .18);
        border-color: var(--green);
    }
    .optionBtn.wrong {
        background: rgba(220, 38, 38, .18);
        border-color: var(--red);
    }
    .feedback {
        margin-top: 10px;
        font-weight: 800;
    }
    .progressBar {
        width: 100%;
        background: rgba(148, 163, 184, .22);
        border-radius: 999px;
        overflow: hidden;
        height: 10px;
        margin-top: 12px;
    }
    .progressFill {
        height: 100%;
        width: 0%;
        background: var(--green);
        transition: width .2s ease;
    }
    .empty {
        text-align: center;
        padding: 35px 10px;
        color: var(--muted);
    }
    mark {
        background: rgba(250, 204, 21, .55);
        border-radius: 4px;
        padding: 0 2px;
    }
    .footerNote {
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        margin: 15px 0 5px;
    }
    @media (max-width: 800px) {
        .stats {
            grid-template-columns: repeat(2, 1fr);
        }
        .controls {
            grid-template-columns: 1fr;
        }
        .app {
            padding: 12px;
        }
        header {
            border-radius: 18px;
        }
        .panel {
            border-radius: 18px;
        }
        button {
            flex: 1 1 auto;
        }
    }
</style>
</head>
<body>
<div class="app">
    <header>
        <h1>Mobil Programlama Çalışma Uygulaması</h1>
        <p>Kotlin, Android, XML, RecyclerView, Room, MVVM, Retrofit, Firebase ve sınav anahtar kelimeleri</p>
    </header>

    <section class="stats">
        <div class="stat"><small>Toplam kart</small><b id="totalCards">0</b></div>
        <div class="stat"><small>Aktif kart</small><b id="activeCard">0</b></div>
        <div class="stat"><small>Biliyorum</small><b id="knownCount">0</b></div>
        <div class="stat"><small>Bilmiyorum</small><b id="unknownCount">0</b></div>
        <div class="stat"><small>Bitirme</small><b id="donePercent">0%</b></div>
    </section>

    <section class="panel">
        <div class="controls">
            <input id="searchInput" type="search" placeholder="Ara: Kotlin, Activity, Room, JSON, null safety...">
            <select id="categoryFilter"></select>
            <button id="themeBtn" class="ghost">🌙/☀️ Tema</button>
        </div>

        <div class="modebar">
            <button id="modeCard" class="active">Kart Modu</button>
            <button id="modeWrite" class="secondary">Yazmalı Mod</button>
            <button id="modeTest" class="secondary">Test Modu</button>
            <button id="modeWrong" class="red">Yapamadıklarım</button>
            <button id="modeKnown" class="green">Öğrendiklerim</button>
        </div>

        <div class="actions">
            <button id="prevBtn" class="secondary">← Geri</button>
            <button id="showBtn">Cevabı Göster</button>
            <button id="nextBtn" class="secondary">İleri →</button>
            <button id="shuffleBtn" class="orange">Karıştır</button>
            <button id="resetBtn" class="ghost">Başa Dön</button>
        </div>

        <div class="progressBar"><div id="progressFill" class="progressFill"></div></div>
    </section>

    <main class="panel card" id="cardArea"></main>

    <section class="panel">
        <div class="learnbar">
            <button id="knowBtn" class="green">Biliyorum</button>
            <button id="dontKnowBtn" class="red">Bilmiyorum</button>
            <button id="clearProgressBtn" class="ghost">İlerlemeyi Sıfırla</button>
        </div>
        <p class="footerNote">Bu dosya internetsiz çalışır. İlerlemen tarayıcının yerel hafızasında saklanır.</p>
    </section>
</div>

let state = {
    mode: "card",
    index: 0,
    filtered: [...ALL_CARDS],
    showAnswer: false,
    testOptions: [],
    selectedOption: null,
    progress: JSON.parse(localStorage.getItem("mobil_programlama_progress_v1") || "{}"),
    dark: localStorage.getItem("mobil_programlama_theme") === "dark"
};

if (state.dark) document.body.classList.add("dark");

const el = id => document.getElementById(id);

function saveProgress() {
    localStorage.setItem("mobil_programlama_progress_v1", JSON.stringify(state.progress));
}

function normalize(s) {
    return String(s || "").toLocaleLowerCase("tr-TR");
}

function getCategories() {
    return ["Tüm Bölümler", ...Array.from(new Set(ALL_CARDS.map(c => c.category))).sort((a,b)=>a.localeCompare(b, "tr"))];
}

function fillCategories() {
    const select = el("categoryFilter");
    select.innerHTML = getCategories().map(c => `<option value="${escapeAttr(c)}">${escapeHtml(c)}</option>`).join("");
}

function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function escapeAttr(str) {
    return escapeHtml(str).replace(/`/g, "&#096;");
}

function cardText(c) {
    return normalize([c.term, c.category, c.question, c.answer, c.hint, c.ezber, c.code, ...(c.alt || [])].join(" "));
}

function applyFilters() {
    const q = normalize(el("searchInput").value.trim());
    const cat = el("categoryFilter").value;
    let base = [...ALL_CARDS];

    if (state.mode === "wrong") {
        base = base.filter(c => state.progress[c.id] === "unknown");
    }
    if (state.mode === "known") {
        base = base.filter(c => state.progress[c.id] === "known");
    }
    if (cat && cat !== "Tüm Bölümler") {
        base = base.filter(c => c.category === cat);
    }
    if (q) {
        base = base.filter(c => cardText(c).includes(q));
    }

    state.filtered = base;
    if (state.index >= state.filtered.length) state.index = 0;
    state.showAnswer = false;
    state.selectedOption = null;
    makeTestOptions();
    render();
}

function setMode(mode) {
    state.mode = mode;
    state.index = 0;
    state.showAnswer = false;
    state.selectedOption = null;
    document.querySelectorAll(".modebar button").forEach(b => b.classList.remove("active"));
    const ids = {card:"modeCard", write:"modeWrite", test:"modeTest", wrong:"modeWrong", known:"modeKnown"};
    el(ids[mode]).classList.add("active");
    applyFilters();
}

function currentCard() {
    return state.filtered[state.index];
}

function makeTestOptions() {
    const c = currentCard();
    if (!c) return;
    const correct = c.answer;
    const pool = ALL_CARDS
        .filter(x => x.id !== c.id && x.answer && x.answer !== correct)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3)
        .map(x => x.answer);
    state.testOptions = [...pool, correct].sort(() => Math.random() - 0.5);
}

function renderStats() {
    const known = Object.values(state.progress).filter(v => v === "known").length;
    const unknown = Object.values(state.progress).filter(v => v === "unknown").length;
    const done = known + unknown;
    el("totalCards").textContent = ALL_CARDS.length;
    el("activeCard").textContent = state.filtered.length ? `${state.index + 1}/${state.filtered.length}` : "0/0";
    el("knownCount").textContent = known;
    el("unknownCount").textContent = unknown;
    el("donePercent").textContent = Math.round((done / ALL_CARDS.length) * 100) + "%";
    el("progressFill").style.width = state.filtered.length ? `${((state.index + 1) / state.filtered.length) * 100}%` : "0%";
}

function render() {
    renderStats();
    const area = el("cardArea");
    const c = currentCard();

    if (!c) {
        area.innerHTML = `<div class="empty"><h2>Kart bulunamadı.</h2><p>Arama veya filtreyi değiştir. Yapamadıklarım/Öğrendiklerim modu boş olabilir.</p></div>`;
        return;
    }

    if (state.mode === "test") {
        renderTest(c);
    } else if (state.mode === "write") {
        renderWrite(c);
    } else {
        renderCard(c);
    }
}

function statusBadge(c) {
    const st = state.progress[c.id];
    if (st === "known") return `<span class="badge" style="color:var(--green)">Biliyorum</span>`;
    if (st === "unknown") return `<span class="badge" style="color:var(--red)">Bilmiyorum</span>`;
    return `<span class="badge kind">Çalışılmadı</span>`;
}

function commonTop(c) {
    return `
        <div class="badgeRow">
            <span class="badge">${escapeHtml(c.category)}</span>
            <span class="badge kind">${escapeHtml(c.kind || "kart")}</span>
            <span class="badge kind">Anahtar: ${escapeHtml(c.term)}</span>
            ${statusBadge(c)}
        </div>
    `;
}

function renderCard(c) {
    el("cardArea").innerHTML = `
        ${commonTop(c)}
        <div class="question">${escapeHtml(c.question)}</div>
        ${c.code ? `<pre>${escapeHtml(c.code)}</pre>` : ""}
        <div class="hintBox"><b>İpucu:</b> ${escapeHtml(c.hint || "Bu kart için ipucu yok.")}</div>
        <div class="answer ${state.showAnswer ? "show" : ""}">
            <div class="answerTitle">Cevap</div>
            <div>${escapeHtml(c.answer)}</div>
            ${c.ezber ? `<div class="ezberBox"><b>Ezber cümlesi:</b> ${escapeHtml(c.ezber)}</div>` : ""}
            ${(c.alt && c.alt.length) ? `<div class="altBox"><b>Alternatif sorulma şekilleri:</b><br>${c.alt.map(a => "• " + escapeHtml(a)).join("<br>")}</div>` : ""}
        </div>
    `;
}

function renderWrite(c) {
    el("cardArea").innerHTML = `
        ${commonTop(c)}
        <div class="question">${escapeHtml(c.question)}</div>
        ${c.code ? `<pre>${escapeHtml(c.code)}</pre>` : ""}
        <textarea id="writeAnswer" placeholder="Cevabı sınavda yazacakmış gibi buraya yaz..."></textarea>
        <div class="actions">
            <button onclick="checkWrite()" class="green">Cevabımı Kontrol Et</button>
            <button onclick="state.showAnswer=true; render()" class="secondary">Doğru Cevabı Göster</button>
        </div>
        <div id="writeFeedback"></div>
        <div class="answer ${state.showAnswer ? "show" : ""}">
            <div class="answerTitle">Doğru Cevap</div>
            <div>${escapeHtml(c.answer)}</div>
            ${c.ezber ? `<div class="ezberBox"><b>Ezber cümlesi:</b> ${escapeHtml(c.ezber)}</div>` : ""}
        </div>
    `;
}

function checkWrite() {
    const c = currentCard();
    const val = normalize(el("writeAnswer").value);
    const important = normalize(c.term).split(/\s+/).filter(Boolean);
    const ansWords = normalize(c.answer).split(/\s+/).filter(w => w.length > 4).slice(0, 6);
    const hits = [...important, ...ansWords].filter(w => val.includes(w)).length;
    const ok = hits >= 1 && val.length > 3;
    const fb = el("writeFeedback");
    fb.innerHTML = `<div class="feedback" style="color:${ok ? "var(--green)" : "var(--red)"}">${ok ? "Güzel, cevap mantığı yakalanmış görünüyor." : "Eksik görünüyor. Doğru cevabı açıp tekrar çalış."}</div>`;
    state.progress[c.id] = ok ? "known" : "unknown";
    saveProgress();
    renderStats();
}

function renderTest(c) {
    if (!state.testOptions.length) makeTestOptions();
    el("cardArea").innerHTML = `
        ${commonTop(c)}
        <div class="question">${escapeHtml(c.question)}</div>
        ${c.code ? `<pre>${escapeHtml(c.code)}</pre>` : ""}
        <div class="testOptions">
            ${state.testOptions.map((o, i) => {
                let cls = "optionBtn";
                if (state.selectedOption !== null) {
                    if (o === c.answer) cls += " correct";
                    else if (i === state.selectedOption) cls += " wrong";
                }
                return `<button class="${cls}" onclick="selectOption(${i})">${String.fromCharCode(65+i)}) ${escapeHtml(o)}</button>`;
            }).join("")}
        </div>
        <div id="testFeedback"></div>
        <div class="answer ${state.selectedOption !== null ? "show" : ""}">
            <div class="answerTitle">Açıklama</div>
            <div>${escapeHtml(c.answer)}</div>
            ${c.ezber ? `<div class="ezberBox"><b>Ezber cümlesi:</b> ${escapeHtml(c.ezber)}</div>` : ""}
        </div>
    `;
    if (state.selectedOption !== null) {
        const chosen = state.testOptions[state.selectedOption];
        const ok = chosen === c.answer;
        el("testFeedback").innerHTML = `<div class="feedback" style="color:${ok ? "var(--green)" : "var(--red)"}">${ok ? "Doğru!" : "Yanlış. Bu kart yapamadıklarına eklendi."}</div>`;
    }
}

function selectOption(i) {
    if (state.selectedOption !== null) return;
    const c = currentCard();
    state.selectedOption = i;
    state.progress[c.id] = state.testOptions[i] === c.answer ? "known" : "unknown";
    saveProgress();
    render();
}

function nextCard() {
    if (!state.filtered.length) return;
    state.index = (state.index + 1) % state.filtered.length;
    state.showAnswer = false;
    state.selectedOption = null;
    makeTestOptions();
    render();
}

function prevCard() {
    if (!state.filtered.length) return;
    state.index = (state.index - 1 + state.filtered.length) % state.filtered.length;
    state.showAnswer = false;
    state.selectedOption = null;
    makeTestOptions();
    render();
}

function shuffleCards() {
    state.filtered.sort(() => Math.random() - 0.5);
    state.index = 0;
    state.showAnswer = false;
    state.selectedOption = null;
    makeTestOptions();
    render();
}

function markCurrent(status) {
    const c = currentCard();
    if (!c) return;
    state.progress[c.id] = status;
    saveProgress();
    if (state.mode === "wrong" || state.mode === "known") {
        applyFilters();
    } else {
        render();
    }
}

el("searchInput").addEventListener("input", applyFilters);
el("categoryFilter").addEventListener("change", applyFilters);
el("themeBtn").addEventListener("click", () => {
    document.body.classList.toggle("dark");
    localStorage.setItem("mobil_programlama_theme", document.body.classList.contains("dark") ? "dark" : "light");
});
el("modeCard").addEventListener("click", () => setMode("card"));
el("modeWrite").addEventListener("click", () => setMode("write"));
el("modeTest").addEventListener("click", () => setMode("test"));
el("modeWrong").addEventListener("click", () => setMode("wrong"));
el("modeKnown").addEventListener("click", () => setMode("known"));
el("prevBtn").addEventListener("click", prevCard);
el("nextBtn").addEventListener("click", nextCard);
el("showBtn").addEventListener("click", () => { state.showAnswer = !state.showAnswer; render(); });
el("shuffleBtn").addEventListener("click", shuffleCards);
el("resetBtn").addEventListener("click", () => { state.index = 0; state.showAnswer=false; state.selectedOption=null; makeTestOptions(); render(); });
el("knowBtn").addEventListener("click", () => markCurrent("known"));
el("dontKnowBtn").addEventListener("click", () => markCurrent("unknown"));
el("clearProgressBtn").addEventListener("click", () => {
    if (confirm("Tüm öğrenme ilerlemesi sıfırlansın mı?")) {
        state.progress = {};
        saveProgress();
        render();
    }
});

document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") nextCard();
    if (e.key === "ArrowLeft") prevCard();
    if (e.key === " ") {
        if (document.activeElement.tagName !== "TEXTAREA" && document.activeElement.tagName !== "INPUT") {
            e.preventDefault();
            state.showAnswer = !state.showAnswer;
            render();
        }
    }
});

fillCategories();
makeTestOptions();
render();
</script>
</body>
</html>
